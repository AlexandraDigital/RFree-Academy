<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a2e">
<meta name="description" content="RFree Academy — Learn AI and Tech Without Limits">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RFree Academy">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<title>RFree Academy — Learn Without Limits</title>
<link href="https://fonts.googleapis.com/css2?family=Arial Black:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
  
:root {
  --purple-900: #1a0a2e;
  --purple-800: #2d1454;
  --purple-700: #3d1a75;
  --purple-600: #5b21b6;
  --purple-500: #7c3aed;
  --purple-400: #a855f7;
  --purple-300: #c084fc;
  --purple-200: #e9d5ff;
  --purple-100: #f5f0ff;
  --gold: #f59e0b;
  --gold-light: #fde68a;
  --mint: #10b981;
  --sky: #38bdf8;
  --pink: #ec4899;
  --white: #ffffff;
  --gray-50: #fafafa;
  --gray-100: #f4f4f5;
  --gray-200: #e4e4e7;
  --gray-400: #a1a1aa;
  --gray-600: #52525b;
  --gray-800: #27272a;
  --radius: 16px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(92,33,237,0.15);
  --shadow-lg: 0 20px 60px rgba(92,33,237,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--purple-900);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ─── BACKGROUND MESH ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,58,237,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(168,85,247,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 30%, rgba(245,158,11,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ─── GLOBAL SCROLL IMPROVEMENTS ─── */
html {
  scroll-behavior: smooth;
  overflow-y: auto;
}

@supports(padding: max(0px)) {
  body {
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
  }
}

/* ─── NAV ─── */
nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,10,46,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(168,85,247,0.2);
  padding: 0 2rem;
  padding-top: max(0.5rem, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 1rem;
  height: 64px;
}

.nav-logo {
  font-family: 'Arial Black', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  background: linear-gradient(135deg, var(--purple-300), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0;
}

.nav-logo span { color: var(--gold); -webkit-text-fill-color: var(--gold); }

.nav-tabs {
  display: flex;
  gap: 4px;
  margin-left: 1rem;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-right: 1rem;
  mask-image: linear-gradient(to right, black calc(100% - 30px), transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black calc(100% - 30px), transparent 100%);
}
.nav-tabs::-webkit-scrollbar { display: none; }
@supports (overflow: -webkit-marquee) {
  .nav-tabs { -webkit-overflow-scrolling: touch; }
}

.nav-tab {
  padding: 6px 16px;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: var(--purple-300);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-tab:hover { background: rgba(168,85,247,0.15); color: var(--white); }
.nav-tab.active { background: rgba(168,85,247,0.25); color: var(--white); border: 1px solid rgba(168,85,247,0.4); }

.nav-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.btn {
  padding: 8px 20px;
  border-radius: 100px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost { background: transparent; color: var(--purple-300); border: 1px solid rgba(168,85,247,0.3); }
.btn-ghost:hover { background: rgba(168,85,247,0.1); color: var(--white); }
.btn-primary { background: linear-gradient(135deg, var(--purple-600), var(--purple-500)); color: var(--white); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
.btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: #1a0a00; font-weight: 700; }
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,158,11,0.4); }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.btn-lg { padding: 14px 32px; font-size: 1rem; border-radius: var(--radius); }
.btn-danger { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.btn-mint { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
.btn-mint:hover { background: rgba(16,185,129,0.3); }

/* ─── PAGES ─── */
.page { 
  display: none; 
  position: relative; 
  z-index: 1;
  width: 100%;
  min-height: calc(100vh - 64px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.page.active { 
  display: block;
}

/* ─── HOME ─── */
.hero {
  min-height: calc(100vh - 64px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
  gap: 2rem;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.35);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 0.8rem;
  color: var(--purple-300);
  animation: fadeInDown 0.6s ease;
}

.hero-badge .dot { width: 6px; height: 6px; background: var(--mint); border-radius: 50%; animation: pulse 2s infinite; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
@keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }

.hero h1 {
  font-family: 'Arial Black', sans-serif;
  font-size: clamp(2.4rem, 6vw, 4.8rem);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -0.02em;
  animation: fadeInUp 0.7s ease 0.1s both;
}

.hero h1 .accent {
  background: linear-gradient(135deg, var(--purple-300) 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 1.2rem;
  color: var(--purple-200);
  max-width: 560px;
  line-height: 1.7;
  font-weight: 300;
  animation: fadeInUp 0.7s ease 0.2s both;
}

.hero-cta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeInUp 0.7s ease 0.3s both;
}

.stats-row {
  display: flex;
  gap: 3rem;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeInUp 0.7s ease 0.4s both;
}

.stat { text-align: center; }
.stat-num { font-family: 'Arial Black', sans-serif; font-size: 2rem; font-weight: 800; color: var(--gold); }
.stat-label { font-size: 0.8rem; color: var(--purple-300); margin-top: 2px; }

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  padding: 3rem 2rem;
  max-width: 1100px;
  margin: 0 auto;
}

.feature-card {
  background: rgba(45,20,84,0.5);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  padding: 1.8rem;
  backdrop-filter: blur(10px);
  transition: all 0.3s;
  cursor: pointer;
}
.feature-card:hover { border-color: rgba(168,85,247,0.5); transform: translateY(-4px); box-shadow: var(--shadow); }

.feature-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  margin-bottom: 1rem;
}

.feature-card h3 { font-family: 'Arial Black', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
.feature-card p { font-size: 0.88rem; color: var(--purple-200); line-height: 1.6; }

/* ─── CARD / PANEL ─── */
.panel {
  background: rgba(45,20,84,0.6);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  backdrop-filter: blur(12px);
}

.page-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.page-header { padding: 2rem 2rem 0; }
.page-title { font-family: 'Arial Black', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
.page-subtitle { color: var(--purple-300); font-size: 0.88rem; margin-top: 4px; font-weight: 400; }

/* ─── LIBRARY ─── */
.library-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.25rem;
  padding: 2rem;
}

.lesson-card {
  background: rgba(45,20,84,0.7);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.3s;
  cursor: pointer;
}
.lesson-card:hover { border-color: var(--purple-400); transform: translateY(-3px); box-shadow: var(--shadow); }

.lesson-thumb {
  height: 160px;
  background: linear-gradient(135deg, var(--purple-800), var(--purple-700));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  position: relative;
  overflow: hidden;
}

.lesson-thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(26,10,46,0.7));
}

.lesson-thumb .play-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 36px; height: 36px;
  background: rgba(245,158,11,0.9);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  z-index: 1;
  color: #1a0a00;
  font-weight: bold;
}

.lesson-body { padding: 1.2rem; }
.lesson-subject {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--purple-400);
  margin-bottom: 6px;
  font-weight: 600;
}
.lesson-title { font-family: 'Arial Black', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.lesson-meta { font-size: 0.78rem; color: var(--purple-300); display: flex; gap: 12px; align-items: center; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.3);
  padding: 2px 10px;
  border-radius: 100px;
  font-size: 0.72rem;
  color: var(--purple-300);
}

/* ─── AI LESSON GENERATOR ─── */
.generator-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  padding: 2rem;
}
@media(max-width:768px) { .generator-layout { grid-template-columns: 1fr; } }

.form-group { margin-bottom: 1.25rem; }
.form-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--purple-300);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(26,10,46,0.8);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--purple-400);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.1);
}
.form-textarea { resize: vertical; min-height: 100px; }
.form-select option { background: var(--purple-800); }

.outline-display {
  background: rgba(26,10,46,0.6);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  padding: 1.5rem;
  min-height: 400px;
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--purple-200);
  white-space: pre-wrap;
  overflow-y: auto;
}

.outline-display .topic { color: var(--gold); font-weight: 600; font-size: 0.9rem; }
.outline-display .subtopic { color: var(--purple-300); margin-left: 1rem; }
.outline-display .content { color: var(--purple-200); margin-left: 2rem; font-size: 0.78rem; }

/* ─── TRANSCRIPT ─── */
.transcript-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  padding: 2rem;
}
@media(max-width:768px) { .transcript-layout { grid-template-columns: 1fr; } }

.transcript-box {
  background: rgba(26,10,46,0.8);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  padding: 1.5rem;
  min-height: 300px;
  font-size: 0.88rem;
  line-height: 1.9;
  color: var(--purple-100);
  overflow-y: auto;
}

.transcript-line { margin-bottom: 0.5rem; animation: slideIn 0.3s ease; }
.transcript-line .time { color: var(--purple-400); font-family: 'DM Mono', monospace; font-size: 0.75rem; margin-right: 8px; }
.transcript-line .speaker { color: var(--gold); font-weight: 600; margin-right: 6px; }

/* ─── STUDIO / RECORDER ─── */
.studio-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 1rem;
  padding: 1rem 2rem 2rem;
  min-height: calc(100vh - 130px);
}
@media(max-width:900px) { .studio-layout { grid-template-columns: 1fr; } }

.canvas-wrapper {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  border: 2px solid rgba(168,85,247,0.3);
  width: 100%;
  height: calc(100vh - 200px);
  min-height: 500px;
}

#studioCanvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: crosshair;
}

.recording-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.9);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1px;
  display: none;
}
.recording-badge .rec-dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s infinite; }

.studio-controls { display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: calc(100vh - 200px); padding-right: 2px; }

.control-section {
  background: rgba(45,20,84,0.6);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.control-section h4 { font-family: 'Arial Black', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--purple-300); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }

.tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.tool-btn {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(168,85,247,0.3);
  background: rgba(26,10,46,0.6);
  color: var(--purple-200);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 1rem;
  transition: all 0.2s;
  padding: 6px;
}
.tool-btn:hover { background: rgba(168,85,247,0.2); border-color: var(--purple-400); color: var(--white); }
.tool-btn.active { background: rgba(168,85,247,0.3); border-color: var(--purple-400); color: var(--white); }
.tool-btn span { font-size: 0.55rem; font-family: 'DM Sans', sans-serif; }

.color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.color-swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.color-swatch:hover, .color-swatch.active { border-color: var(--white); transform: scale(1.2); }

/* ===== FIXED & IMPROVED SIZE SLIDER ===== */
.size-slider {
  width: 100%;
  height: 6px; /* slightly thicker for better visibility */
  border-radius: 3px;
  background: rgba(168, 85, 247, 0.3);
  outline: none;
  -webkit-appearance: none; /* Chrome, Safari, Edge */
  appearance: none; /* Firefox */
  cursor: pointer;
  transition: background 0.3s;
}

/* Track hover/focus effect */
.size-slider:hover {
  background: rgba(168, 85, 247, 0.5);
}

/* WebKit/Chrome/Safari */
.size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;  /* slightly larger thumb */
  height: 20px;
  border-radius: 50%;
  background: var(--purple-400);
  border: 2px solid #fff; /* optional border for contrast */
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}

.size-slider::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}

/* Firefox */
.size-slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--purple-400);
  border: 2px solid #fff;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}

.size-slider::-moz-range-thumb:hover {
  transform: scale(1.1);
}

/* IE / Edge */
.size-slider::-ms-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--purple-400);
  border: 2px solid #fff;
  cursor: pointer;
}


.rec-controls { display: flex; flex-direction: column; gap: 8px; }

.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 2rem;
  font-weight: 500;
  color: var(--gold);
  text-align: center;
  padding: 12px;
  background: rgba(26,10,46,0.6);
  border-radius: var(--radius-sm);
}

/* ─── LESSONS VIEWER ─── */
.viewer-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 1.5rem;
  padding: 2rem;
}
@media(max-width:900px) { .viewer-layout { grid-template-columns: 1fr; } }

.video-frame {
  background: rgba(26,10,46,0.9);
  border-radius: var(--radius);
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(168,85,247,0.3);
  flex-direction: column;
  gap: 1rem;
  font-size: 4rem;
}

.viewer-sidebar { display: flex; flex-direction: column; gap: 1rem; }

/* ─── SUPPORT / FUNDING ─── */
.funding-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  padding: 2rem;
}

.funding-card {
  background: rgba(45,20,84,0.6);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius);
  padding: 1.8rem;
  text-align: center;
  transition: all 0.3s;
}
.funding-card:hover { border-color: var(--gold); transform: translateY(-4px); }
.funding-card .f-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
.funding-card h3 { font-family: 'Arial Black', sans-serif; font-weight: 700; margin-bottom: 0.5rem; }
.funding-card p { font-size: 0.85rem; color: var(--purple-200); line-height: 1.6; margin-bottom: 1.2rem; }

/* ─── SETTINGS ─── */
.settings-layout { 
  display: grid; 
  grid-template-columns: 220px 1fr; 
  gap: 1.5rem; 
  padding: 2rem;
  padding-bottom: 3rem;
  width: 100%;
}
@media(max-width:700px) { 
  .settings-layout { 
    grid-template-columns: 1fr;
    padding: 1.5rem;
  } 
}

.settings-nav { 
  display: flex; 
  flex-direction: column; 
  gap: 4px;
  position: sticky;
  top: 64px;

<script>
// ═══════════════════════════════════════════════════════════
// UPDATE NAV DISPLAY: Show/Hide Auth vs Admin buttons
// ═══════════════════════════════════════════════════════════

function updateNavDisplay() {
  const isAdmin = isStaff && isStaff(); // Use existing admin check
  const authButtons = document.getElementById('authButtons');
  const adminBtn = document.getElementById('adminPanelBtn');
  const body = document.body;
  
  if (isAdmin) {
    // ✓ ADMIN MODE: Show admin button, hide auth buttons
    if (authButtons) authButtons.style.display = 'none';
    if (adminBtn) adminBtn.style.display = 'inline-flex';
    body.classList.add('is-admin');
  } else {
    // ✓ REGULAR MODE: Show auth buttons, hide admin button
    if (authButtons) authButtons.style.display = 'flex';
    if (adminBtn) adminBtn.style.display = 'none';
    body.classList.remove('is-admin');
  }
}

// Call on page load
document.addEventListener('DOMContentLoaded', function() {
  updateNavDisplay();
});

// Open admin panel handler (placeholder — customize for your needs)
function openAdminPanel() {
  if (!isStaff || !isStaff()) {
    showToast('⛔ Admin panel is staff-only.', 'error');
    return;
  }

  showToast('👑 Opening admin panel...', 'success');
}
</script>
