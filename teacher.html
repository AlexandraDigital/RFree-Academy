<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard — RFree Academy</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a0a2e; color: #fff; padding: 2rem; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    h1 { font-size: 1.6rem; color: #f59e0b; }
    h3 { color: #c084fc; margin: 1.5rem 0 0.5rem; }
    input, textarea {
      display: block; width: 100%; max-width: 480px;
      padding: 10px 12px; margin-bottom: 12px;
      background: rgba(45,20,84,0.5); border: 1px solid rgba(168,85,247,0.3);
      border-radius: 8px; color: #fff; font-size: 0.95rem;
    }
    textarea { min-height: 80px; resize: vertical; }
    .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-back { background: rgba(168,85,247,0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.4); text-decoration: none; display: inline-block; }
    .output { margin-top: 1rem; padding: 1rem; background: rgba(45,20,84,0.5); border-radius: 8px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; display: none; }
    .output.visible { display: block; }
    .error { color: #fca5a5; }
    .success { color: #6ee7b7; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>👨‍🏫 Teacher Dashboard</h1>
  <a href="index.html" class="btn btn-back">← Back to Academy</a>
</div>

<h3>Create Course</h3>
<input id="courseId" placeholder="Course ID (e.g. financial-101)" />
<input id="courseTitle" placeholder="Course Title" />
<textarea id="courseDesc" placeholder="Description (optional)"></textarea>
<button class="btn btn-primary" onclick="createCourse()">Create Course</button>

<div id="output" class="output"></div>

<script>
  const API_BASE_STORAGE_KEY = 'rfree_api_base';
  const DEFAULT_API_BASE = 'https://rfree-academy-backend.futuresuccess105.workers.dev';
  const token = localStorage.getItem('rfree_token');
  const role = localStorage.getItem('rfree_role');

  function apiUrl(path) {
    const params = new URLSearchParams(window.location.search);
    const base = (params.get('api') || localStorage.getItem(API_BASE_STORAGE_KEY) || DEFAULT_API_BASE).replace(/\/+$/, '');
    return base ? `${base}${path}` : path;
  }

  // Auth guard — must be teacher or admin
  if (!token || !['teacher', 'admin'].includes(role)) {
    alert('Access denied. Teacher or admin account required.');
    window.location.href = 'index.html';
  }

  async function createCourse() {
    const id = document.getElementById('courseId').value.trim();
    const title = document.getElementById('courseTitle').value.trim();
    const description = document.getElementById('courseDesc').value.trim();
    const out = document.getElementById('output');

    if (!id || !title) {
      out.className = 'output visible error';
      out.textContent = '❌ Course ID and Title are required.';
      return;
    }

    try {
      const res = await fetch(apiUrl('/api/courses'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ id, title, description, data: [] })
      });

      if (res.status === 401) {
        alert('Session expired. Please sign in again.');
        window.location.href = 'index.html';
        return;
      }

      const data = await res.json();

      if (!res.ok || data.error) {
        out.className = 'output visible error';
        out.textContent = '❌ ' + (data.error || 'Failed to create course.');
      } else {
        out.className = 'output visible success';
        out.textContent = '✅ Course created!\n' + JSON.stringify(data, null, 2);
        document.getElementById('courseId').value = '';
        document.getElementById('courseTitle').value = '';
        document.getElementById('courseDesc').value = '';
      }
    } catch(e) {
      out.className = 'output visible error';
      out.textContent = '❌ Could not connect to server: ' + e.message;
    }
  }
</script>
</body>
</html>
