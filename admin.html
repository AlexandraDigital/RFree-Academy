<!DOCTYPE html>
<html>
<head>
  <title>RFREE Admin Panel</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<h1>👑 Admin Panel</h1>

<div>
  <button onclick="loadUsers()">Load Users</button>
  <button onclick="loadStats()">Load Stats</button>
</div>

<h2>📊 Stats</h2>
<div id="stats"></div>

<h2>👤 Users</h2>
<div id="users"></div>

<script>
let isLoginMode = false;

// ======================
// SWITCH TO LOGIN MODE
// ======================
function switchToLogin() {
  isLoginMode = true;

  document.getElementById("title").innerText = "Welcome Back";
  document.getElementById("desc").innerText = "Sign in to continue learning";
  document.getElementById("mainBtn").innerText = "Sign In";
}

// ======================
// SIGNUP + LOGIN HANDLER
// ======================
async function handleAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Fill all fields");
    return;
  }

  if (isLoginMode) {
    // LOGIN
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.error) {
      alert("Login failed");
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);
    localStorage.setItem("userId", data.userId);

    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "dashboard.html";
    }

  } else {
    // REGISTER
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.error) {
      alert("Signup failed");
      return;
    }

    alert("Account created! Click Sign In Instead.");
    switchToLogin();
  }
}

// ======================
// ADMIN: LOAD USERS
// ======================
async function loadUsers() {
  const res = await fetch("/api/admin/users", {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  if (!Array.isArray(data)) {
    console.error("Failed to load users:", data);
    return;
  }

  document.getElementById("users").innerHTML =
    data.map(u => `
      <div class="card">
        <b>${u.email}</b> - ${u.role}

        <button onclick="changeRole(${u.id}, 'student')">Student</button>
        <button onclick="changeRole(${u.id}, 'teacher')">Teacher</button>
        <button onclick="changeRole(${u.id}, 'admin')">Admin</button>

        <button onclick="deleteUser(${u.id})">Delete</button>
      </div>
    `).join("");
}

// ======================
// CHANGE ROLE
// ======================
async function changeRole(userId, role) {
  await fetch("/api/admin/role", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ userId, role })
  });

  loadUsers();
}

// ======================
// DELETE USER
// ======================
async function deleteUser(userId) {
  await fetch("/api/admin/delete-user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ userId })
  });

  loadUsers();
}

// ======================
// LOAD STATS
// ======================
async function loadStats() {
  const res = await fetch("/api/admin/stats", {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  document.getElementById("stats").innerHTML = `
    <div class="card">
      👤 Users: ${data.totalUsers}<br>
      📚 Completed Lessons: ${data.completedLessons}
    </div>
  `;
}
</script>
<script>
async function checkAdmin() {
  const res = await fetch("/api/me", {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const user = await res.json();

  if (!user || user.role !== "admin") {
    window.location.href = "index.html";
  }
}
checkAdmin();
  </script>
</body>
</html>
