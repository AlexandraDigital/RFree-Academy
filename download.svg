<svg width="150" height="50" viewBox="0 0 150 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (optional rounded rectangle) -->
  <rect width="150" height="50" rx="12" ry="12" fill="#00000000"></rect>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00; stop-opacity:1"></stop> <!-- Orange -->
      <stop offset="100%" style="stop-color:#8A2BE2; stop-opacity:1"></stop> <!-- Purple -->
    </linearGradient>
  </defs>

  <!-- Text with gradient fill -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" fill="url(#grad1)">
    RFree
  </text>
</svg>