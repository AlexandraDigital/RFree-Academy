<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — RFree Academy</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a0a2e; color: #fff; padding: 2rem; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    h1 { font-size: 1.6rem; color: #f59e0b; }
    h3 { color: #c084fc; margin: 1.5rem 0 0.5rem; }
    .progress-bar { width: 100%; max-width: 400px; height: 20px; background: #2d1454; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #10b981); border-radius: 10px; transition: width 0.5s ease; }
    .xp-badge { display: inline-block; background: rgba(245,158,11,0.2); color: #fde68a; border: 1px solid rgba(245,158,11,0.4); padding: 4px 16px; border-radius: 100px; font-weight: 700; margin-top: 0.5rem; }
    .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .btn-back { background: rgba(168,85,247,0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.4); text-decoration: none; display: inline-block; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>📊 Student Dashboard</h1>
  <a href="index.html" class="btn btn-back">← Back to Academy</a>
</div>

<h3>Progress</h3>
<div class="progress-bar">
  <div class="progress-fill" id="fill" style="width:0%"></div>
</div>
<p style="color:#a78bfa;font-size:0.85rem;margin-top:0.4rem"><span id="completedCount">0</span> lessons completed</p>

<h3>XP Earned</h3>
<div class="xp-badge">⭐ <span id="xp">0</span> XP</div>

<div id="errorMsg" class="error" style="margin-top:1rem;display:none"></div>

<script>
  const API_BASE_STORAGE_KEY = 'rfree_api_base';
  const DEFAULT_API_BASE = 'https://rfree-academy-backend.futuresuccess105.workers.dev';
  const token = localStorage.getItem('rfree_token');

  function apiUrl(path) {
    const params = new URLSearchParams(window.location.search);
    const base = (params.get('api') || localStorage.getItem(API_BASE_STORAGE_KEY) || DEFAULT_API_BASE).replace(/\/+$/, '');
    return base ? `${base}${path}` : path;
  }

  // Auth guard — redirect if not logged in
  if (!token) {
    alert('Please sign in to view your dashboard.');
    window.location.href = 'index.html';
  }

  async function load() {
    try {
      const res = await fetch(apiUrl('/api/progress'), {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (!res.ok) {
        if (res.status === 401) {
          alert('Session expired. Please sign in again.');
          window.location.href = 'index.html';
          return;
        }
        throw new Error('Failed to load progress');
      }

      const data = await res.json();
      const completed = (Array.isArray(data) ? data : []).filter(p => p.completed).length;
      const total = 88; // total lessons across all tracks

      document.getElementById('fill').style.width = Math.min((completed / total) * 100, 100) + '%';
      document.getElementById('completedCount').textContent = completed;
      document.getElementById('xp').textContent = completed * 10;
    } catch(e) {
      const err = document.getElementById('errorMsg');
      err.textContent = '❌ Could not load progress: ' + e.message;
      err.style.display = 'block';
    }
  }

  load();
</script>
</body>
</html>
